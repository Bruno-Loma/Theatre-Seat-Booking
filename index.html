<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theatre Booking MVP</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #5a0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .shows {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background-color: #7a1a1a;
      padding: 15px;
      border-radius: 8px;
    }

    .form-box {
      background-color: #7a1a1a;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0 15px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: gold;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: orange;
    }

    .hidden {
      display: none;
    }

    .success {
      color: lightgreen;
      margin-top: 10px;
    }

    .seats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 15px 0;
    }

    .seat {
      background-color: #ccc;
      color: black;
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
    }

    .seat.selected {
      background-color: gold;
    }

    .total {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎭 Theatre Booking</h1>

    <!-- Show List -->
    <div id="shows" class="shows"></div>

    <!-- Booking Form -->
    <div class="form-box">
      <h2>Book Tickets</h2>

      <label>Your Name</label>
      <input id="name" placeholder="Enter your name" />

      <label>Select Show</label>
      <select id="showSelect"></select>

      <label>Adult Tickets</label>
      <input id="adult" type="number" min="0" value="0" />

      <label>Child Tickets</label>
      <input id="child" type="number" min="0" value="0" />

      <h3>Select Seats</h3>
      <div id="seats" class="seats"></div>

      <p class="total">Total Price: $<span id="total">0</span></p>

      <button onclick="bookTickets()">Book Now</button>

      <p id="confirmation" class="success hidden">
        ✅ Booking successful!
      </p>
    </div>
  </div>

  <script>
    // 🎭 Mock Shows
    const shows = [
      { id: 1, title: "Hamlet", date: "2026-05-01", price: 10 },
      { id: 2, title: "Macbeth", date: "2026-05-05", price: 12 },
      { id: 3, title: "Othello", date: "2026-05-10", price: 11 }
    ];

    const showContainer = document.getElementById("shows");
    const showSelect = document.getElementById("showSelect");
    const totalDisplay = document.getElementById("total");

    let selectedSeats = [];

    // Render Shows
    shows.forEach(show => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${show.title}</h3>
        <p>Date: ${show.date}</p>
        <p>Price: $${show.price}</p>
      `;
      showContainer.appendChild(div);

      const option = document.createElement("option");
      option.value = show.id;
      option.textContent = `${show.title} (${show.date})`;
      showSelect.appendChild(option);
    });

    // Generate Seats
    const seatsContainer = document.getElementById("seats");

    for (let i = 1; i <= 25; i++) {
      const seat = document.createElement("div");
      seat.className = "seat";
      seat.textContent = i;

      seat.onclick = () => {
        if (selectedSeats.includes(i)) {
          selectedSeats = selectedSeats.filter(s => s !== i);
          seat.classList.remove("selected");
        } else {
          selectedSeats.push(i);
          seat.classList.add("selected");
        }

        console.log("Selected seats:", selectedSeats);
      };

      seatsContainer.appendChild(seat);
    }

    function getSelectedShow() {
      return shows.find(s => s.id == showSelect.value);
    }

    function calculateTotal() {
      const show = getSelectedShow();
      const adult = parseInt(document.getElementById("adult").value) || 0;
      const child = parseInt(document.getElementById("child").value) || 0;

      const total = (adult + child) * show.price;
      totalDisplay.textContent = total;
    }

    // Update total when inputs change
    document.getElementById("adult").addEventListener("input", calculateTotal);
    document.getElementById("child").addEventListener("input", calculateTotal);
    document.getElementById("showSelect").addEventListener("change", calculateTotal);

    // Booking function
    function bookTickets() {
      const name = document.getElementById("name").value;
      const show = getSelectedShow();
      const adult = parseInt(document.getElementById("adult").value);
      const child = parseInt(document.getElementById("child").value);

      if (!name || (adult === 0 && child === 0) || selectedSeats.length === 0) {
        alert("Please complete all fields, including selecting seats.");
        return;
      }

      const booking = {
        name,
        showId: show.id,
        showTitle: show.title,
        seats: selectedSeats,
        adult,
        child,
        total: (adult + child) * show.price,
        time: new Date()
      };

      console.log("Booking submitted:", booking);

      document.getElementById("confirmation").classList.remove("hidden");
    }

    // Initial total calculation
    calculateTotal();
  </script>

</body>
</html>
