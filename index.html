<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theatre Booking Pro</title>

<style>
body {
  font-family: Arial;
  background: #1a1a1a;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

.stage {
  background: #ccc;
  height: 50px;
  margin: 20px 0;
  border-radius: 10px;
  color: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

.row {
  display: flex;
  justify-content: center;
  margin: 5px;
}

.seat {
  width: 30px;
  height: 30px;
  margin: 4px;
  border-radius: 5px;
  background: #777;
  cursor: pointer;
}

.seat.selected {
  background: gold;
}

.seat.occupied {
  background: #222;
  cursor: not-allowed;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px;
}

.box {
  width: 20px;
  height: 20px;
  border-radius: 4px;
}

.available { background: #777; }
.selected-box { background: gold; }
.occupied-box { background: #222; }

select, input, button {
  margin: 10px;
  padding: 8px;
}

.summary {
  margin-top: 20px;
}

.ticket-list {
  margin-top: 20px;
  text-align: left;
  background: #2a2a2a;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎭 Theatre Booking</h1>

<select id="movie">
  <option value="10">Hamlet - $10</option>
  <option value="12">Macbeth - $12</option>
  <option value="15">Othello - $15</option>
</select>

<div class="stage">STAGE</div>

<div class="legend">
  <div><div class="box available"></div> Available</div>
  <div><div class="box selected-box"></div> Selected</div>
  <div><div class="box occupied-box"></div> Taken</div>
</div>

<div id="seats"></div>

<div class="ticket-list" id="ticketList">
  <strong>Selected Seats:</strong>
  <div id="ticketDetails"></div>
</div>

<div class="summary">
  Total: $<span id="total">0</span>
</div>

<input id="name" placeholder="Your Name">
<button onclick="book()">Book Now</button>

</div>

<script>
const rows = ["A","B","C","D","E"];
const cols = 8;

const seatContainer = document.getElementById("seats");
const ticketDetails = document.getElementById("ticketDetails");

let selectedSeats = {}; 
// { A1: "adult", B2: "child" }

const occupiedSeats = ["A3","B5","C2","D6"];

rows.forEach(row => {
  const rowDiv = document.createElement("div");
  rowDiv.className = "row";

  for (let i = 1; i <= cols; i++) {
    const seatId = row + i;
    const seat = document.createElement("div");
    seat.className = "seat";

    if (occupiedSeats.includes(seatId)) {
      seat.classList.add("occupied");
    }

    seat.onclick = () => {
      if (seat.classList.contains("occupied")) return;

      if (selectedSeats[seatId]) {
        delete selectedSeats[seatId];
        seat.classList.remove("selected");
      } else {
        selectedSeats[seatId] = "adult";
        seat.classList.add("selected");
      }

      renderTickets();
    };

    rowDiv.appendChild(seat);
  }

  seatContainer.appendChild(rowDiv);
});

const movieSelect = document.getElementById("movie");

function renderTickets() {
  ticketDetails.innerHTML = "";

  const basePrice = parseInt(movieSelect.value);

  Object.keys(selectedSeats).forEach(seat => {
    const div = document.createElement("div");

    div.innerHTML = `
      Seat ${seat} 
      <select onchange="changeType('${seat}', this.value)">
        <option value="adult" ${selectedSeats[seat] === "adult" ? "selected" : ""}>Adult ($${basePrice})</option>
        <option value="child" ${selectedSeats[seat] === "child" ? "selected" : ""}>Child ($${Math.round(basePrice * 0.7)})</option>
      </select>
    `;

    ticketDetails.appendChild(div);
  });

  updateTotal();
}

function changeType(seat, type) {
  selectedSeats[seat] = type;
  updateTotal();
}

function updateTotal() {
  const basePrice = parseInt(movieSelect.value);
  let total = 0;

  Object.values(selectedSeats).forEach(type => {
    if (type === "adult") total += basePrice;
    else total += Math.round(basePrice * 0.7);
  });

  document.getElementById("total").textContent = total;
}

movieSelect.addEventListener("change", renderTickets);

function book() {
  const name = document.getElementById("name").value;

  if (!name || Object.keys(selectedSeats).length === 0) {
    alert("Enter name and select seats");
    return;
  }

  const booking = {
    name,
    seats: selectedSeats,
    movie: movieSelect.value,
    total: document.getElementById("total").textContent
  };

  console.log("BOOKING:", booking);
  alert("Booking successful!");
}

</script>

</body>
</html>
