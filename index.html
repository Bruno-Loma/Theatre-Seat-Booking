<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theatre Booking Pro</title>

<style>
body {
  font-family: Arial;
  background: #1a1a1a;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

.screen {
  background: #ccc;
  height: 50px;
  margin: 20px 0;
  border-radius: 10px;
  color: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

.row {
  display: flex;
  justify-content: center;
  margin: 5px;
}

.seat {
  width: 30px;
  height: 30px;
  margin: 4px;
  border-radius: 5px;
  background: #777;
  cursor: pointer;
}

.seat.selected {
  background: gold;
}

.seat.occupied {
  background: #222;
  cursor: not-allowed;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px;
}

.legend div {
  display: flex;
  align-items: center;
  gap: 5px;
}

.box {
  width: 20px;
  height: 20px;
  border-radius: 4px;
}

.available { background: #777; }
.selected-box { background: gold; }
.occupied-box { background: #222; }

select, input, button {
  margin: 10px;
  padding: 8px;
}

.summary {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎭 Theatre Booking</h1>

<select id="movie">
  <option value="10">Hamlet - $10</option>
  <option value="12">Macbeth - $12</option>
  <option value="15">Othello - $15</option>
</select>

<div class="screen">SCREEN</div>

<div class="legend">
  <div><div class="box available"></div> Available</div>
  <div><div class="box selected-box"></div> Selected</div>
  <div><div class="box occupied-box"></div> Taken</div>
</div>

<div id="seats"></div>

<div class="summary">
  Seats Selected: <span id="count">0</span><br>
  Price per ticket: $<span id="price">10</span><br>
  Total: $<span id="total">0</span>
</div>

<input id="name" placeholder="Your Name">
<button onclick="book()">Book Now</button>

</div>

<script>
const rows = ["A","B","C","D","E"];
const cols = 8;

const seatContainer = document.getElementById("seats");
let selectedSeats = [];

// Mock occupied seats
const occupiedSeats = ["A3","B5","C2","D6"];

rows.forEach(row => {
  const rowDiv = document.createElement("div");
  rowDiv.className = "row";

  for (let i = 1; i <= cols; i++) {
    const seatId = row + i;
    const seat = document.createElement("div");
    seat.className = "seat";
    seat.dataset.id = seatId;

    if (occupiedSeats.includes(seatId)) {
      seat.classList.add("occupied");
    }

    seat.onclick = () => {
      if (seat.classList.contains("occupied")) return;

      if (selectedSeats.includes(seatId)) {
        selectedSeats = selectedSeats.filter(s => s !== seatId);
        seat.classList.remove("selected");
      } else {
        selectedSeats.push(seatId);
        seat.classList.add("selected");
      }

      updateTotal();
    };

    rowDiv.appendChild(seat);
  }

  seatContainer.appendChild(rowDiv);
});

const movieSelect = document.getElementById("movie");

function updateTotal() {
  const price = parseInt(movieSelect.value);
  document.getElementById("price").textContent = price;
  document.getElementById("count").textContent = selectedSeats.length;
  document.getElementById("total").textContent = selectedSeats.length * price;
}

movieSelect.addEventListener("change", updateTotal);

function book() {
  const name = document.getElementById("name").value;

  if (!name || selectedSeats.length === 0) {
    alert("Enter name and select seats");
    return;
  }

  const booking = {
    name,
    seats: selectedSeats,
    price: movieSelect.value,
    total: selectedSeats.length * movieSelect.value
  };

  console.log("BOOKING:", booking);
  alert("Booking successful!");
}

updateTotal();
</script>

</body>
</html>
