<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stage Booking</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.stage {
  background: linear-gradient(to right, #9333ea, #ec4899);
  height: 80px;
  width: 60%;
  margin: 20px auto;
  border-radius: 10px;
  line-height: 80px;
  font-weight: bold;
}

.row {
  display: flex;
  justify-content: center;
  align-items: center;
}

.row-label { width: 30px; }

.seat {
  width: 28px;
  height: 28px;
  margin: 4px;
  border-radius: 6px;
  background: #1f2937;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.seat.selected { background: #22c55e; }
.seat.occupied { background: #ef4444; cursor: not-allowed; }

.controls { margin-top: 20px; }

input, select {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  cursor: pointer;
}

#total { margin-top: 10px; }
</style>
</head>

<body>

<h1>🎭 Stage Booking</h1>

<select id="playSelect">
  <option value="play1">Hamlet</option>
  <option value="play2">Romeo & Juliet</option>
  <option value="play3">Macbeth</option>
  <option value="play4">Othello</option>
  <option value="play5">King Lear</option>
</select>

<div class="stage">STAGE</div>

<div id="seats"></div>

<div class="controls">
  <input type="text" id="name" placeholder="Your Name">

  <select id="ticketType">
    <option value="adult">Adult ($10)</option>
    <option value="child">Child ($5)</option>
  </select>

  <div id="total">Total: $0</div>

  <button onclick="bookSeats()">Book Now</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rows = ["A","B","C","D","E","F","G","H"];
const cols = 12;

const prices = { adult: 10, child: 5 };

let selectedSeats = [];
let currentPlay = "play1";

const container = document.getElementById("seats");
const totalDisplay = document.getElementById("total");

function createSeats() {
  container.innerHTML = "";

  rows.forEach(r => {
    const row = document.createElement("div");
    row.classList.add("row");

    const label = document.createElement("div");
    label.classList.add("row-label");
    label.innerText = r;
    row.appendChild(label);

    for (let i = 1; i <= cols; i++) {
      const seat = document.createElement("div");
      const id = r + i;

      seat.classList.add("seat");
      seat.innerText = i;
      seat.dataset.id = id;

      seat.onclick = () => {
        if (seat.classList.contains("occupied")) return;

        seat.classList.toggle("selected");

        if (selectedSeats.includes(id)) {
          selectedSeats = selectedSeats.filter(s => s !== id);
        } else {
          selectedSeats.push(id);
        }

        updateTotal();
      };

      row.appendChild(seat);
    }

    container.appendChild(row);
  });
}

function updateTotal() {
  const type = document.getElementById("ticketType").value;
  totalDisplay.innerText =
    "Total: $" + (selectedSeats.length * prices[type]);
}

async function loadSeats() {
  selectedSeats = [];
  updateTotal();

  const ref = doc(db, "plays", currentPlay);
  const snap = await getDoc(ref);

  document.querySelectorAll(".seat").forEach(s => {
    s.classList.remove("occupied", "selected");
  });

  if (snap.exists()) {
    const booked = snap.data().list || [];

    document.querySelectorAll(".seat").forEach(seat => {
      if (booked.includes(seat.dataset.id)) {
        seat.classList.add("occupied");
      }
    });
  }
}

async function bookSeats() {
  const name = document.getElementById("name").value;

  if (!name) return alert("Enter your name");
  if (selectedSeats.length === 0) return alert("Select seats");

  const ref = doc(db, "plays", currentPlay);
  const snap = await getDoc(ref);

  let booked = [];

  if (snap.exists()) {
    booked = snap.data().list || [];
  }

  const updated = [...new Set([...booked, ...selectedSeats])];

  await setDoc(ref, { list: updated });

  alert("✅ Seats booked successfully!");

  loadSeats();
}

document.getElementById("playSelect").onchange = (e) => {
  currentPlay = e.target.value;
  loadSeats();
};

document.getElementById("ticketType").onchange = updateTotal;

createSeats();
loadSeats();

window.bookSeats = bookSeats;
</script>

</body>
</html>
