<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stage Seat Booking</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.stage {
  background: linear-gradient(to right, #9333ea, #ec4899);
  height: 80px;
  width: 60%;
  margin: 20px auto;
  border-radius: 10px;
  line-height: 80px;
  font-weight: bold;
}

.container {
  margin-top: 20px;
}

.row {
  display: flex;
  justify-content: center;
  align-items: center;
}

.row-label {
  width: 30px;
}

.seat {
  width: 28px;
  height: 28px;
  margin: 4px;
  border-radius: 6px;
  background: #1f2937;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.seat.selected {
  background: #22c55e;
}

.seat.occupied {
  background: #ef4444;
  cursor: not-allowed;
}

.legend {
  margin-top: 20px;
}

.legend span {
  margin: 10px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-size: 16px;
}
</style>

</head>
<body>

<h1>🎭 Stage Seat Booking</h1>

<div class="stage">STAGE</div>

<div class="container" id="seats"></div>

<div class="legend">
  <span>⬛ Available</span>
  <span>🟩 Selected</span>
  <span>🟥 Occupied</span>
</div>

<button onclick="bookSeats()">Confirm Booking</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rows = ["A","B","C","D","E","F","G","H"];
const cols = 12;

const container = document.getElementById("seats");
let selectedSeats = [];

function createSeats() {
  rows.forEach(rowLetter => {
    const row = document.createElement("div");
    row.classList.add("row");

    const label = document.createElement("div");
    label.classList.add("row-label");
    label.innerText = rowLetter;
    row.appendChild(label);

    for (let i = 1; i <= cols; i++) {
      const seat = document.createElement("div");
      seat.classList.add("seat");

      const id = rowLetter + i;
      seat.dataset.id = id;
      seat.innerText = i;

      seat.addEventListener("click", () => {
        if (seat.classList.contains("occupied")) return;

        seat.classList.toggle("selected");

        if (selectedSeats.includes(id)) {
          selectedSeats = selectedSeats.filter(s => s !== id);
        } else {
          selectedSeats.push(id);
        }
      });

      row.appendChild(seat);
    }

    container.appendChild(row);
  });
}

async function loadSeats() {
  const ref = doc(db, "seats", "booked");
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const booked = snap.data().list || [];

    document.querySelectorAll(".seat").forEach(seat => {
      if (booked.includes(seat.dataset.id)) {
        seat.classList.add("occupied");
      }
    });
  }
}

async function bookSeats() {
  if (selectedSeats.length === 0) {
    alert("Select at least one seat");
    return;
  }

  const ref = doc(db, "seats", "booked");
  const snap = await getDoc(ref);

  let booked = [];

  if (snap.exists()) {
    booked = snap.data().list || [];
  }

  const updated = [...new Set([...booked, ...selectedSeats])];

  await setDoc(ref, { list: updated });

  alert("Seats booked successfully 🎉");
  location.reload();
}

createSeats();
loadSeats();

window.bookSeats = bookSeats;
</script>

</body>
</html>
window.bookSeats = bookSeats;
</script>

</body>
</html>
