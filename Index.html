<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stage Booking</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.stage {
  background: linear-gradient(to right, #9333ea, #ec4899);
  height: 80px;
  width: 60%;
  margin: 20px auto;
  border-radius: 10px;
  line-height: 80px;
  font-weight: bold;
}

.row {
  display: flex;
  justify-content: center;
  align-items: center;
}

.row-label { width: 30px; }

.seat {
  width: 28px;
  height: 28px;
  margin: 4px;
  border-radius: 6px;
  background: #1f2937;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.seat.selected { background: #22c55e; }
.seat.occupied { background: #ef4444; cursor: not-allowed; }

.controls { margin-top: 20px; }

input {
  padding: 8px;
  margin: 5px;
  width: 150px;
}

button {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  cursor: pointer;
}

#total { margin-top: 10px; }
</style>
</head>

<body>

<h1>🎭 Stage Booking</h1>

<select id="playSelect">
  <option value="play1">Hamlet</option>
  <option value="play2">Romeo & Juliet</option>
  <option value="play3">Macbeth</option>
</select>

<div class="stage">STAGE</div>

<div id="seats"></div>

<div class="controls">
  <input type="text" id="name" placeholder="Your Name"><br>

  Adult Tickets: <input type="number" id="adultCount" value="0" min="0">
  Child Tickets: <input type="number" id="childCount" value="0" min="0">

  <div id="total">Total: $0</div>

  <button onclick="bookSeats()">Book Now</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rows = ["A","B","C","D","E","F","G","H"];
const cols = 12;

const prices = { adult: 10, child: 5 };

let selectedSeats = [];
let currentPlay = "play1";
let unsubscribe = null;

const container = document.getElementById("seats");
const totalDisplay = document.getElementById("total");

function createSeats() {
  container.innerHTML = "";

  rows.forEach(r => {
    const row = document.createElement("div");
    row.classList.add("row");

    const label = document.createElement("div");
    label.classList.add("row-label");
    label.innerText = r;
    row.appendChild(label);

    for (let i = 1; i <= cols; i++) {
      const seat = document.createElement("div");
      const id = r + i;

      seat.classList.add("seat");
      seat.innerText = i;
      seat.dataset.id = id;

      seat.onclick = () => {
        if (seat.classList.contains("occupied")) return;

        seat.classList.toggle("selected");

        if (selectedSeats.includes(id)) {
          selectedSeats = selectedSeats.filter(s => s !== id);
        } else {
          selectedSeats.push(id);
        }

        updateTotal();
      };

      row.appendChild(seat);
    }

    container.appendChild(row);
  });
}

function updateTotal() {
  const adult = parseInt(document.getElementById("adultCount").value) || 0;
  const child = parseInt(document.getElementById("childCount").value) || 0;

  const total = adult * prices.adult + child * prices.child;

  totalDisplay.innerText = "Total: $" + total;
}

function listenSeats() {
  if (unsubscribe) unsubscribe();

  const ref = doc(db, "plays", currentPlay);

  unsubscribe = onSnapshot(ref, (snap) => {
    document.querySelectorAll(".seat").forEach(s => {
      s.classList.remove("occupied");
    });

    if (snap.exists()) {
      const booked = snap.data().list || [];

      document.querySelectorAll(".seat").forEach(seat => {
        if (booked.includes(seat.dataset.id)) {
          seat.classList.add("occupied");
        }
      });
    }
  });
}

async function bookSeats() {
  const name = document.getElementById("name").value;
  const adult = parseInt(document.getElementById("adultCount").value) || 0;
  const child = parseInt(document.getElementById("childCount").value) || 0;

  if (!name) return alert("Enter your name");

  const totalTickets = adult + child;

  if (totalTickets === 0) return alert("Add tickets");
  if (selectedSeats.length !== totalTickets)
    return alert("Seats must match ticket count");

  const ref = doc(db, "plays", currentPlay);
  const snap = await getDoc(ref);

  let booked = [];

  if (snap.exists()) {
    booked = snap.data().list || [];
  }

  // prevent double booking
  const conflict = selectedSeats.some(seat => booked.includes(seat));
  if (conflict) return alert("Some seats already booked!");

  const updated = [...booked, ...selectedSeats];

  await setDoc(ref, { list: updated });

  alert("✅ Booking confirmed!");

  selectedSeats = [];
  document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));

  updateTotal();
}

document.getElementById("playSelect").onchange = (e) => {
  currentPlay = e.target.value;
  selectedSeats = [];
  createSeats();
  listenSeats();
};

document.getElementById("adultCount").oninput = updateTotal;
document.getElementById("childCount").oninput = updateTotal;

createSeats();
listenSeats();
updateTotal();

window.bookSeats = bookSeats;
</script>

</body>
</html>
