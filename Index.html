<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theatre Booking MVP new </title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #5a0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .shows {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background-color: #7a1a1a;
      padding: 15px;
      border-radius: 8px;
    }

    .form-box {
      background-color: #7a1a1a;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0 15px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: gold;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: orange;
    }

    .hidden {
      display: none;
    }

    .success {
      color: lightgreen;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎭 Theatre Booking</h1>

    <div id="shows" class="shows"></div>

    <div class="form-box">
      <h2>Book Tickets</h2>

      <label>Your Name</label>
      <input id="name" placeholder="Enter your name" />

      <label>Select Show</label>
      <select id="showSelect"></select>

      <label>Adult Tickets</label>
      <input id="adult" type="number" min="0" value="0" />

      <label>Child Tickets</label>
      <input id="child" type="number" min="0" value="0" />

      <button onclick="bookTickets()">Book Now</button>

      <p id="confirmation" class="success hidden">
        ✅ Booking successful!
      </p>
    </div>
  </div>

  <script type="module">
    // 🔥 Import Firebase (CDN version)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ✅ Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBWTTqHBkIAVfetEgIJRN7EfTfe7JxCYdo",
      authDomain: "seatsyncloma.firebaseapp.com",
      projectId: "seatsyncloma",
      storageBucket: "seatsyncloma.firebasestorage.app",
      messagingSenderId: "829540724530",
      appId: "1:829540724530:web:bb3516bb99f511959c312b"
    };

    // ✅ Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    console.log("Firestore Database connected successfully!");

    // 🎭 Mock Data
    const shows = [
      { id: 1, title: "Hamlet", date: "2026-05-01", price: 10 },
      { id: 2, title: "Macbeth", date: "2026-05-05", price: 12 },
      { id: 3, title: "Othello", date: "2026-05-10", price: 11 }
    ];

    const showContainer = document.getElementById("shows");
    const showSelect = document.getElementById("showSelect");

    // Render shows
    shows.forEach(show => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${show.title}</h3>
        <p>Date: ${show.date}</p>
        <p>Price: $${show.price}</p>
      `;
      showContainer.appendChild(div);

      const option = document.createElement("option");
      option.value = show.id;
      option.textContent = `${show.title} (${show.date})`;
      showSelect.appendChild(option);
    });

    // 🔥 REAL booking (now saves to Firestore)
    window.bookTickets = async function () {
      const name = document.getElementById("name").value;
      const showId = document.getElementById("showSelect").value;
      const adult = parseInt(document.getElementById("adult").value);
      const child = parseInt(document.getElementById("child").value);

      if (!name || (adult === 0 && child === 0)) {
        alert("Please enter name and select at least 1 ticket.");
        return;
      }

      const booking = {
        name,
        showId,
        adult,
        child,
        time: new Date()
      };

      try {
        await addDoc(collection(db, "bookings"), booking);

        console.log("Booking saved:", booking);

        document.getElementById("confirmation").classList.remove("hidden");
      } catch (error) {
        console.error("Error saving booking:", error);
      }
    };
  </script>

</body>
</html>
