<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stage Booking</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }

.stage {
  background: linear-gradient(to right, #9333ea, #ec4899);
  height:80px; width:60%; margin:20px auto;
  border-radius:10px; line-height:80px; font-weight:bold;
}

.row { display:flex; justify-content:center; align-items:center; }
.row-label { width:30px; }

.seat {
  width:28px; height:28px; margin:4px;
  border-radius:6px; background:#1f2937;
  cursor:pointer; font-size:10px;
  display:flex; align-items:center; justify-content:center;
}

.seat.selected { background:#22c55e; }
.seat.occupied { background:#ef4444; cursor:not-allowed; }

input { padding:6px; margin:5px; width:120px; }
button { padding:10px 20px; background:#22c55e; border:none; cursor:pointer; }

#total { margin-top:10px; }
</style>
</head>

<body>

<h1>🎭 Stage Booking</h1>

<select id="playSelect">
  <option value="play1">Hamlet</option>
  <option value="play2">Romeo & Juliet</option>
</select>

<div class="stage">STAGE</div>

<div id="seats"></div>

<br>
<input id="name" placeholder="Your name"><br>

Adult: <input type="number" id="adult" value="0" min="0">
Child: <input type="number" id="child" value="0" min="0">

<div id="total">Total: $0</div>

<button onclick="book()">Book Now</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 REPLACE THIS WITH YOUR REAL CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rows = ["A","B","C","D","E","F"];
const cols = 10;

const prices = { adult:10, child:5 };

let selected = [];
let play = "play1";

const container = document.getElementById("seats");

function drawSeats() {
  container.innerHTML = "";

  rows.forEach(r => {
    const row = document.createElement("div");
    row.className = "row";

    const label = document.createElement("div");
    label.className = "row-label";
    label.innerText = r;
    row.appendChild(label);

    for (let i=1;i<=cols;i++) {
      const id = r+i;
      const seat = document.createElement("div");

      seat.className = "seat";
      seat.innerText = i;
      seat.dataset.id = id;

      seat.onclick = () => {
        if (seat.classList.contains("occupied")) return;

        seat.classList.toggle("selected");

        if (selected.includes(id)) {
          selected = selected.filter(s => s!==id);
        } else {
          selected.push(id);
        }
      };

      row.appendChild(seat);
    }

    container.appendChild(row);
  });
}

function updateTotal() {
  const a = +document.getElementById("adult").value || 0;
  const c = +document.getElementById("child").value || 0;

  document.getElementById("total").innerText =
    "Total: $" + (a*prices.adult + c*prices.child);
}

document.getElementById("adult").oninput = updateTotal;
document.getElementById("child").oninput = updateTotal;

function listenSeats() {
  const ref = doc(db, "plays", play);

  onSnapshot(ref, (snap) => {
    const data = snap.data() || {};
    const seats = data.seats || {};

    document.querySelectorAll(".seat").forEach(s => {
      s.classList.remove("occupied");
      if (seats[s.dataset.id]) {
        s.classList.add("occupied");
      }
    });
  });
}

async function book() {
  try {
    const name = document.getElementById("name").value.trim();
    const adult = +document.getElementById("adult").value || 0;
    const child = +document.getElementById("child").value || 0;

    const totalTickets = adult + child;

    if (!name) return alert("Enter your name");
    if (totalTickets === 0) return alert("Add tickets");
    if (selected.length !== totalTickets)
      return alert("Seats must match number of tickets");

    const ref = doc(db, "plays", play);

    await runTransaction(db, async (tx) => {
      const snap = await tx.get(ref);
      const data = snap.data() || {};

      const seats = data.seats || {};
      const bookings = data.bookings || [];

      // ❌ prevent double booking
      for (let s of selected) {
        if (seats[s]) throw new Error("Seat already booked");
      }

      // 🎟 assign ticket types
      let i = 0;
      const ticketMap = {};

      selected.forEach(seat => {
        ticketMap[seat] = i < adult ? "adult" : "child";
        i++;
      });

      // 💾 save seat data
      selected.forEach(seat => {
        seats[seat] = {
          name,
          type: ticketMap[seat],
          time: Date.now()
        };
      });

      // 💾 save booking record
      bookings.push({
        name,
        seats: selected,
        adult,
        child,
        time: Date.now()
      });

      tx.set(ref, { seats, bookings });
    });

    alert("✅ Booking successful!");

    selected = [];
    document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));

  } catch (err) {
    alert("❌ " + err.message);
    console.error(err);
  }
}

// 🔥 IMPORTANT: make button work
window.book = book;

document.getElementById("playSelect").onchange = (e) => {
  play = e.target.value;
  selected = [];
  drawSeats();
  listenSeats();
};

drawSeats();
listenSeats();
updateTotal();

</script>

</body>
</html>
