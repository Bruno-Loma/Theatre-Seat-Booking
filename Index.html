<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theatre Booking</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  margin-top: 40px;
}

.screen {
  background: #fff;
  height: 70px;
  width: 60%;
  margin: 20px auto;
  transform: rotateX(-45deg);
}

.row {
  display: flex;
  justify-content: center;
}

.seat {
  background: #444;
  height: 25px;
  width: 25px;
  margin: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.seat.selected {
  background: green;
}

.seat.occupied {
  background: red;
  cursor: not-allowed;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #00c853;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>🎬 Theatre Seat Booking</h1>

<div class="container">
  <div class="screen"></div>

  <div id="seats"></div>

  <button onclick="bookSeats()">Book Selected Seats</button>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rows = 6;
const cols = 8;

const seatsContainer = document.getElementById("seats");
let selectedSeats = [];

function createSeats() {
  for (let i = 0; i < rows; i++) {
    const row = document.createElement("div");
    row.classList.add("row");

    for (let j = 0; j < cols; j++) {
      const seat = document.createElement("div");
      seat.classList.add("seat");

      const seatId = `${i}-${j}`;
      seat.dataset.id = seatId;

      seat.addEventListener("click", () => {
        if (seat.classList.contains("occupied")) return;

        seat.classList.toggle("selected");

        if (selectedSeats.includes(seatId)) {
          selectedSeats = selectedSeats.filter(s => s !== seatId);
        } else {
          selectedSeats.push(seatId);
        }
      });

      row.appendChild(seat);
    }

    seatsContainer.appendChild(row);
  }
}

async function loadOccupiedSeats() {
  const docRef = doc(db, "seats", "booked");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();
    const booked = data.list || [];

    document.querySelectorAll(".seat").forEach(seat => {
      if (booked.includes(seat.dataset.id)) {
        seat.classList.add("occupied");
      }
    });
  }
}

async function bookSeats() {
  if (selectedSeats.length === 0) return alert("No seats selected");

  const docRef = doc(db, "seats", "booked");
  const docSnap = await getDoc(docRef);

  let booked = [];

  if (docSnap.exists()) {
    booked = docSnap.data().list || [];
  }

  const updated = [...new Set([...booked, ...selectedSeats])];

  await setDoc(docRef, { list: updated });

  alert("Seats booked!");

  location.reload();
}

createSeats();
loadOccupiedSeats();

window.bookSeats = bookSeats;
</script>

</body>
</html>
